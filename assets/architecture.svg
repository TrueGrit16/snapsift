<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 200" width="980" height="200" font-family="Segoe UI, Arial, sans-serif">
  <defs><linearGradient id="b" x1="0" x2="1"><stop offset="0" stop-color="#8A2BE2"/><stop offset="1" stop-color="#FF6F00"/></linearGradient></defs>
  <style>.box{fill:#161a2b;stroke:url(#b);stroke-width:2;rx:10}.t{fill:#e5e7eb;font-size:13px;font-weight:600}.s{fill:#9aa3b2;font-size:11px}.a{stroke:#FF6F00;stroke-width:2;marker-end:url(#ar)}</style>
  <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#FF6F00"/></marker>
  <g>
    <rect class="box" x="10"  y="60" width="118" height="64" rx="10"/><text class="t" x="24" y="86">Inventory</text><text class="s" x="24" y="104">EXIF, timeline</text>
    <rect class="box" x="148" y="60" width="130" height="64" rx="10"/><text class="t" x="162" y="86">Quality</text><text class="s" x="162" y="104">sharp, expo, color</text>
    <rect class="box" x="298" y="60" width="150" height="64" rx="10"/><text class="t" x="312" y="86">Modern vision</text><text class="s" x="312" y="104">pose, face, readiness</text>
    <rect class="box" x="468" y="60" width="140" height="64" rx="10"/><text class="t" x="482" y="86">Cluster + score</text><text class="s" x="482" y="104">keep best, reject bad</text>
    <rect class="box" x="628" y="60" width="120" height="64" rx="10"/><text class="t" x="642" y="86">Verify</text><text class="s" x="642" y="104">contact sheets</text>
