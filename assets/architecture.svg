  <g class="a" fill="none">
    <line x1="128" y1="92" x2="146" y2="92"/><line x1="278" y1="92" x2="296" y2="92"/><line x1="448" y1="92" x2="466" y2="92"/><line x1="608" y1="92" x2="626" y2="92"/>
    <line x1="748" y1="80" x2="766" y2="52"/><line x1="748" y1="104" x2="766" y2="128"/><line x1="868" y1="92" x2="886" y2="92"/>
